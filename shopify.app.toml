client_id = "70d368e80112d79506baa9274713eac5"
name = "megaska-ops-hub"
application_url = "https://megaska-ops-hub-express-dev.vercel.app"
embedded = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/api/webhooks/orders/create"

[access_scopes]
scopes = "read_all_orders,read_customers,write_customers,read_discounts,write_discounts,write_metaobject_definitions,read_orders,write_orders,read_products,write_products,unauthenticated_write_checkouts,unauthenticated_read_checkouts,unauthenticated_read_metaobjects,unauthenticated_read_product_listings"
optional_scopes = []
use_legacy_install_flow = false

[access.admin]
direct_api_mode = "online"

[auth]
redirect_urls = ["https://megaska-ops-hub-express-dev.vercel.app/api/auth/callback"]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
